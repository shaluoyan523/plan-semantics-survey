name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create HF Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          python3 - <<'PYEOF'
          import os
          from huggingface_hub import HfApi
          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          try:
              api.repo_info(repo_id="shaluoyan523/plan-semantics-survey", repo_type="space")
              print("Space already exists")
          except Exception:
              api.create_repo(
                  repo_id="shaluoyan523/plan-semantics-survey",
                  repo_type="space",
                  space_sdk="docker",
                  private=False,
              )
              print("Space created")
          PYEOF

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://shaluoyan523:${HF_TOKEN}@huggingface.co/spaces/shaluoyan523/plan-semantics-survey"
          git push hf main --force
