name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://ShaofantuoshuzhengzhiSha:${HF_TOKEN}@huggingface.co/spaces/ShaofantuoshuzhengzhiSha/GUIGuard-Bench"
          git push hf main --force
